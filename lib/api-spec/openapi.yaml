openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Andi Language Learning Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: words
  - name: lessons
  - name: exercises
  - name: flashcards
  - name: progress
  - name: stats
  - name: morphology
  - name: grammar
  - name: phrases
  - name: translate
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: user-data
    description: Per-user favorites, translation history and settings.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /words:
    get:
      operationId: listWords
      tags: [words]
      summary: List dictionary words
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: partOfSpeech
          in: query
          schema:
            type: string
        - name: nounClass
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of words
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordList"
    post:
      operationId: createWord
      tags: [words]
      summary: Create a new word
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"

  /words/random:
    get:
      operationId: getRandomWord
      tags: [words]
      summary: Get a random word of the day
      responses:
        "200":
          description: Random word
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"

  /words/analyze:
    post:
      operationId: analyzeWord
      tags: [morphology]
      summary: Morphological analysis of an Andi word (rule-based, preliminary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeWordInput"
      responses:
        "200":
          description: Morphological analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MorphologicalAnalysis"

  /words/{id}:
    get:
      operationId: getWord
      tags: [words]
      summary: Get a word by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Word found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
        "404":
          description: Not found
    patch:
      operationId: updateWord
      tags: [words]
      summary: Update a word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"
    delete:
      operationId: deleteWord
      tags: [words]
      summary: Delete a word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /words/{id}/forms:
    get:
      operationId: getWordForms
      tags: [morphology]
      summary: Get declined/conjugated forms of a word
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Word forms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WordFormsResponse"

  /lessons:
    get:
      operationId: listLessons
      tags: [lessons]
      summary: List all lessons
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"
    post:
      operationId: createLesson
      tags: [lessons]
      summary: Create a lesson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /lessons/{id}:
    get:
      operationId: getLesson
      tags: [lessons]
      summary: Get lesson by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
        "404":
          description: Not found
    patch:
      operationId: updateLesson
      tags: [lessons]
      summary: Update a lesson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LessonUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"

  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercises
      parameters:
        - name: lessonId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
    post:
      operationId: createExercise
      tags: [exercises]
      summary: Create an exercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"

  /exercises/{id}/submit:
    post:
      operationId: submitExercise
      tags: [exercises]
      summary: Submit an answer to an exercise
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExerciseSubmission"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseResult"

  /flashcards/due:
    get:
      operationId: getDueFlashcards
      tags: [flashcards]
      summary: Get flashcards due for review
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Due flashcards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flashcard"

  /flashcards/{wordId}/review:
    post:
      operationId: reviewFlashcard
      tags: [flashcards]
      summary: Record a flashcard review result
      parameters:
        - name: wordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardReview"
      responses:
        "200":
          description: Updated flashcard state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flashcard"

  /progress:
    get:
      operationId: getProgress
      tags: [progress]
      summary: Get current user progress summary
      responses:
        "200":
          description: Progress summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSummary"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/activity:
    get:
      operationId: getActivityFeed
      tags: [stats]
      summary: Get recent learning activity
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /grammar/cases:
    get:
      operationId: getCaseParadigms
      tags: [grammar]
      summary: Get Andi case system with paradigms
      responses:
        "200":
          description: Case paradigms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseParadigmsResponse"

  /grammar/classes:
    get:
      operationId: getNounClasses
      tags: [grammar]
      summary: Get Andi noun class (grammatical gender) system
      responses:
        "200":
          description: Noun classes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NounClassesResponse"

  /phrases:
    get:
      operationId: listPhrases
      tags: [phrases]
      summary: List phrasebank entries
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: audioStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of phrases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhraseList"
    post:
      operationId: createPhrase
      tags: [phrases]
      summary: Create a phrase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhraseInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phrase"

  /phrases/categories:
    get:
      operationId: listPhraseCategories
      tags: [phrases]
      summary: List phrase categories with counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountEntry"

  /phrases/{id}:
    get:
      operationId: getPhrase
      tags: [phrases]
      summary: Get a phrase by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Phrase found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phrase"
        "404":
          description: Not found
    patch:
      operationId: updatePhrase
      tags: [phrases]
      summary: Update a phrase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhraseUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phrase"

  /phrases/{id}/request-audio:
    post:
      operationId: requestPhraseAudio
      tags: [phrases]
      summary: Mark a phrase's audio as requested from native speakers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Phrase"

  /words/{id}/request-audio:
    post:
      operationId: requestWordAudio
      tags: [words]
      summary: Mark a word's audio as requested from native speakers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Word"

  /translate:
    post:
      operationId: translateText
      tags: [translate]
      summary: Translate a Russian sentence into Andi with confidence scoring (draft, not machine translation)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateInput"
      responses:
        "200":
          description: Translation draft with per-segment confidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationResult"

  /grammar/drills:
    get:
      operationId: getGrammarDrills
      tags: [grammar]
      summary: Get grammar drill exercises
      parameters:
        - name: topic
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Grammar drills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GrammarDrill"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /me/favorites:
    get:
      tags: [user-data]
      operationId: listMyFavorites
      summary: List the current user's favorite words and phrases
      responses:
        "200":
          description: Favorites list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Favorite"
    post:
      tags: [user-data]
      operationId: addMyFavorite
      summary: Add a word or phrase to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteInput"
      responses:
        "201":
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorite"
  /me/favorites/{itemType}/{itemId}:
    delete:
      tags: [user-data]
      operationId: removeMyFavorite
      summary: Remove a favorite
      parameters:
        - name: itemType
          in: path
          required: true
          schema:
            type: string
            enum: [word, phrase]
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /me/history:
    get:
      tags: [user-data]
      operationId: listMyTranslationHistory
      summary: List the current user's translation history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Translation history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
    post:
      tags: [user-data]
      operationId: addMyHistoryEntry
      summary: Save a translation to history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HistoryEntryInput"
      responses:
        "201":
          description: History entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryEntry"
    delete:
      tags: [user-data]
      operationId: clearMyTranslationHistory
      summary: Clear the current user's translation history
      responses:
        "204":
          description: Cleared

  /me/settings:
    get:
      tags: [user-data]
      operationId: getMySettings
      summary: Get the current user's settings
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    put:
      tags: [user-data]
      operationId: updateMySettings
      summary: Update the current user's settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  /me/stats:
    get:
      tags: [user-data]
      operationId: getMyStats
      summary: Get the current user's learning stats
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStatsRecord"

  /me/lessons/completed:
    get:
      tags: [user-data]
      operationId: getMyCompletedLessons
      summary: Get the IDs of lessons the current user has completed
      responses:
        "200":
          description: List of completed lesson IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /me/lessons/{id}/complete:
    post:
      tags: [user-data]
      operationId: completeMyLesson
      summary: Mark a lesson as completed for the current user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lesson marked completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonCompletionResult"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Favorite:
      type: object
      required: [id, itemType, itemId, createdAt]
      properties:
        id:
          type: integer
        itemType:
          type: string
          enum: [word, phrase]
        itemId:
          type: integer
        createdAt:
          type: string
    FavoriteInput:
      type: object
      required: [itemType, itemId]
      properties:
        itemType:
          type: string
          enum: [word, phrase]
        itemId:
          type: integer

    HistoryEntry:
      type: object
      required: [id, inputText, resultText, createdAt]
      properties:
        id:
          type: integer
        inputText:
          type: string
        resultText:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        createdAt:
          type: string
    HistoryEntryInput:
      type: object
      required: [inputText]
      properties:
        inputText:
          type: string
        resultText:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]

    UserSettings:
      type: object
      required: [dailyGoal, showTransliteration, theme]
      properties:
        dailyGoal:
          type: integer
        showTransliteration:
          type: boolean
        theme:
          type: string
    UserSettingsInput:
      type: object
      properties:
        dailyGoal:
          type: integer
        showTransliteration:
          type: boolean
        theme:
          type: string

    UserStatsRecord:
      type: object
      required: [streak, exercisesDone, wordsLearned, lessonsCompleted]
      properties:
        streak:
          type: integer
        exercisesDone:
          type: integer
        wordsLearned:
          type: integer
        lessonsCompleted:
          type: integer
        lastActivityAt:
          type: ["string", "null"]

    LessonCompletionResult:
      type: object
      required: [lessonId, alreadyCompleted, lessonsCompleted]
      properties:
        lessonId:
          type: integer
        alreadyCompleted:
          type: boolean
        lessonsCompleted:
          type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Word:
      type: object
      required: [id, andiWord, russian, partOfSpeech, createdAt]
      properties:
        id:
          type: integer
        andiWord:
          type: string
        lemma:
          type: ["string", "null"]
        russian:
          type: string
        english:
          type: ["string", "null"]
        partOfSpeech:
          type: string
        nounClass:
          type: ["string", "null"]
        grammaticalFunction:
          type: ["string", "null"]
        root:
