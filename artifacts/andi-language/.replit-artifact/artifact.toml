kind = "web"
previewPath = "/"
title = "Andi Language Learning Platform"
version = "1.0.0"
id = "artifacts/andi-language"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18238

[services.development]
run = "pnpm --filter @workspace/andi-language run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/andi-language", "run", "build" ]
publicDir = "artifacts/andi-language/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18238"
BASE_PATH = "/"
